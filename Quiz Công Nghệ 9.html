        @media (prefers-color-scheme: light) {
            :root {
                --color-bg-base: #ffffff;
                --color-bg-surface: #f8fafc;
                --color-text-primary: #0f172a;
                --color-text-secondary: #475569;
                --color-primary: #0284c7;
                --color-primary-hover: #0369a1;

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container {

            margin: 0 auto;
        }

        header {

            padding: 30px 0;
            border-bottom: 2px solid var(--color-border);
            margin-bottom: 30px;
        }

        h1 {
            color: var(--color-primary);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-bg-base);
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--color-bg-surface);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: var(--color-border);
        }

        .question-card {
            background: var(--color-bg-surface);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--color-border);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .question-number {
            color: var(--color-primary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            background: var(--color-bg-base);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: var(--color-primary);
            transform: translateX(5px);
        }

        .option.selected {
            border-color: var(--color-primary);
            background: rgba(56, 189, 248, 0.1);
        }

        .option.correct {
            border-color: var(--color-success);
            background: rgba(16, 185, 129, 0.1);
        }

        .option.incorrect {
            border-color: var(--color-error);
            background: rgba(239, 68, 68, 0.1);
        }

        .result {
            background: var(--color-bg-surface);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-top: 30px;
            border: 2px solid var(--color-primary);
        }

        .score {
            font-size: 3rem;
            color: var(--color-primary);
            font-weight: bold;
            margin: 20px 0;
        }

        .feedback {
            font-size: 1.2rem;
            color: var(--color-text-secondary);
            margin-top: 15px;
        }

        .progress {
            background: var(--color-bg-surface);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--color-primary);
            transition: width 0.3s;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

                    "Xu hướng cung lớn hơn cầu."

        let userAnswers = [];
        let quizStarted = false;

        const quizContainer = document.getElementById('quizContainer');
        const resultContainer = document.getElementById('resultContainer');
        const startBtn = document.getElementById('startBtn');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');

        startBtn.addEventListener('click', startQuiz);
        submitBtn.addEventListener('click', submitQuiz);
        resetBtn.addEventListener('click', resetQuiz);

        function startQuiz() {
            quizStarted = true;
            userAnswers = new Array(questions.length).fill(null);

            startBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            progress.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            
            renderQuiz();
            updateProgress();
        }

        function renderQuiz() {
            quizContainer.innerHTML = '';
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="question-number">Câu ${index + 1}/${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" data-question="${index}" data-option="${i}">
                                ${String.fromCharCode(65 + i)}. ${opt}
                            </div>
                        `).join('')}
                    </div>
                `;
                quizContainer.appendChild(card);
            });

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', handleAnswer);
            });
        }

        function handleAnswer(e) {
            const option = e.currentTarget;
            const questionIndex = parseInt(option.dataset.question);
            const optionIndex = parseInt(option.dataset.option);
            
            const allOptions = document.querySelectorAll(`[data-question="${questionIndex}"]`);
            allOptions.forEach(o => o.classList.remove('selected'));
            option.classList.add('selected');
            userAnswers[questionIndex] = optionIndex;
            
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(a => a !== null).length;
            const percentage = (answered / questions.length) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        function submitQuiz() {
            let correct = 0;
            
            questions.forEach((q, index) => {
                if (userAnswers[index] === q.correct) {
                    correct++;
                }
            });
            
            document.querySelectorAll('.option').forEach(opt => {
                const qIndex = parseInt(opt.dataset.question);
                const oIndex = parseInt(opt.dataset.option);
                if (oIndex === questions[qIndex].correct) {
                    opt.classList.add('correct');
                } else if (userAnswers[qIndex] === oIndex) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none';
            });
            
            const percentage = ((correct / questions.length) * 100).toFixed(1);
            let feedback = '';
            
            if (percentage >= 90) {
                feedback = '🎉 Xuất sắc! Bạn nắm vững kiến thức!';
            } else if (percentage >= 80) {
                feedback = '👍 Giỏi lắm! Bạn hiểu bài rất tốt!';
            } else if (percentage >= 70) {
                feedback = '😊 Khá tốt! Hãy ôn lại một số phần.';
            } else if (percentage >= 60) {
                feedback = '📚 Trung bình. Cần ôn tập thêm nhé!';
            } else {
                feedback = '💪 Hãy cố gắng hơn! Đọc lại đề cương nhé!';
            }
            
            resultContainer.innerHTML = `
                <h2 style="color: var(--color-primary);">KẾT QUẢ BÀI QUIZ</h2>
                <div class="score">${correct}/${questions.length}</div>
                <p style="font-size: 1.5rem; color: var(--color-text-primary);">${percentage}%</p>
                <p class="feedback">${feedback}</p>
            `;
            
            resultContainer.classList.remove('hidden');
            submitBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetQuiz() {
            quizStarted = false;
            userAnswers = [];
            quizContainer.innerHTML = '';
            resultContainer.classList.add('hidden');
            resetBtn.classList.add('hidden');
            submitBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            progress.classList.add('hidden');
            progressBar.style.width = '0%';
        }
    </script>
